{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FitXFocus</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4 shadow">
    <a class="navbar-brand text-decoration-none" href="{% url 'home' %}">FitXFocus</a>

    <div>
        <a href="{% url 'home' %}" class="text-white me-3 text-decoration-none">Home</a>
        <a href="{% url 'plan_list' %}" class="text-white me-3 text-decoration-none">Plans</a>

        {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button class="btn btn-link text-white p-0 text-decoration-none" type="submit">
                    Logout
                </button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="text-white me-2 text-decoration-none">Login</a>
            <a href="{% url 'register' %}" class="text-white text-decoration-none">Join</a>
        {% endif %}
    </div>
</nav>

<!-- Page content -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-1">&copy; 2026 FitXFocus. All rights reserved.</p>
    <p class="mb-0 small">Fitness plans, premium workouts, and meal guidance.</p>
</footer>

</body>
</html>
