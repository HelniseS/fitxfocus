{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FitXFocus</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">FitXFocus</a>

    <div>
        <a href="/" class="text-white me-3">Home</a>
        <a href="/plans/" class="text-white me-3">Plans</a>

        {% if user.is_authenticated %}
            <a href="/logout/" class="text-white">Logout</a>
        {% else %}
            <a href="/login/" class="text-white me-2">Login</a>
            <a href="/register/" class="text-white">Join</a>
        {% endif %}
    </div>
</nav>

<!-- Page content -->
{% block content %}{% endblock %}

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-1">&copy; 2026 FitXFocus. All rights reserved.</p>
    <p class="mb-0 small">Fitness plans, premium workouts, and meal guidance.</p>
</footer>

</body>
</html>
